experiment_name: rf_oob_grid_search
task: classification
random_state: 42
test_size: 0.2
run_grid_search: true
compute_oob_importance: true
include_decision_tree: true

model_params:
  n_estimators: 100
  max_features: sqrt
  max_depth: null
  min_samples_leaf: 1
  criterion: gini
  oob_score: true

param_grid:
  n_estimators: [100, 200]
  max_features: ["sqrt", 0.5]
  max_depth: [null, 12]
  min_samples_leaf: [1, 3]
  criterion: ["gini"]
