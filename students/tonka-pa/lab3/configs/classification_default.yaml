name: classification_default
task: classification
description: "Titanic — default params: 100 trees, lr=0.1, depth=3"
split:
  test_size: 0.2
  random_state: 42
  cv_folds: 5
model:
  n_estimators: 100
  learning_rate: 0.1
  max_depth: 3
  min_samples_split: 2
  min_samples_leaf: 1
  subsample: 1.0
