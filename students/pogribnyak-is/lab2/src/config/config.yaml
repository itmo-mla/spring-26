dataset:
  name: "breast_cancer"  # название датасета из data.datasets
  test_size: 0.2
  val_size: 0.25
  seed: 42

model:
  type: "random_forest"  # random_forest или rsm
  base_estimator: "decision_tree"  # decision_tree, svm, etc.
  
  # Параметры для grid search
  grid_search:
    n_estimators: [50, 100, 200]
    max_features: [0.5, 0.7, "sqrt", "log2"]
    max_depth: [5, 10, null]
    min_samples_split: [2, 5, 10]
    min_samples_leaf: [1, 2, 4]
    
  # Фиксированные параметры
  random_state: 42
  n_jobs: -1

comparison:
  sklearn_model:
    n_estimators: 100
    max_features: "sqrt"
    max_depth: 10
    min_samples_split: 2
    min_samples_leaf: 1
    random_state: 42
    n_jobs: -1

plots:
  dir: "plots"  # путь относительно корня проекта
